<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trampa | Döngüsel Mobilya Sistemi</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // İkon bileşeni: CDN sürümüyle uyumlu hale getirildi
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons();
                }
            }, [name]);

            const kebabName = name
                .replace(/([a-z0-9])([A-Z])/g, '$1-$2')
                .toLowerCase();

            return (
                <i 
                    ref={iconRef}
                    data-lucide={kebabName} 
                    className={className}
                    style={{ 
                        width: size, 
                        height: size, 
                        display: 'inline-flex', 
                        alignItems: 'center', 
                        justifyContent: 'center' 
                    }}
                ></i>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('marketplace');
            const [filterType, setFilterType] = useState(null); 
            
            // Mevcut kurulum verileri (Artık statik veya başlangıç verisi olarak korunuyor)
            const [selectedTop] = useState({ id: 't1', name: 'Doğal Meşe', material: 'Masif Ahşap', color: 'bg-amber-100', image: 'https://images.unsplash.com/photo-1519947486511-46149fa0a254?auto=format&fit=crop&q=80&w=200' });
            const [selectedLeg] = useState({ id: 'l1', name: 'Endüstriyel', material: 'Mat Çelik', color: 'bg-zinc-800', image: 'https://images.unsplash.com/photo-1503602642458-232111445657?auto=format&fit=crop&q=80&w=200' });
            
            const [showSwapModal, setShowSwapModal] = useState(false);
            const [swapTarget, setSwapTarget] = useState(null);
            
            // İstatistikler
            const [swapCount, setSwapCount] = useState(12);

            const marketplaceItems = [
                { id: 'm1', type: 'top', name: 'Carrara Mermer', owner: 'Selin Y.', material: 'Mermer', distance: '2.4 km', score: 9.2, image: 'https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&q=80&w=300' },
                { id: 'm2', type: 'leg', name: 'Konik Ahşap Ayak', owner: 'Ahmet K.', material: 'Ceviz', distance: '5.1 km', score: 7.5, image: 'https://images.unsplash.com/photo-1592078615290-033ee584e267?auto=format&fit=crop&q=80&w=300' },
                { id: 'm3', type: 'top', name: 'Geri Dönüştürülmüş Polimer', owner: 'Ece D.', material: 'Plastik Atık', distance: '0.8 km', score: 10, image: 'https://images.unsplash.com/photo-1581428982868-e410dd047a90?auto=format&fit=crop&q=80&w=300' },
                { id: 'm4', type: 'leg', name: 'Hairpin Metal Ayak', owner: 'Can M.', material: 'Bakır Kaplama', distance: '12.0 km', score: 8.8, image: 'https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&q=80&w=300' },
                { id: 'm5', type: 'top', name: 'Ham Beton Tabla', owner: 'Deniz T.', material: 'Beton', distance: '3.7 km', score: 6.4, image: 'https://images.unsplash.com/photo-1595515106969-1ce29566ff1c?auto=format&fit=crop&q=80&w=300' },
            ];

            const handleSwapRequest = (item) => {
                setSwapTarget(item);
                setShowSwapModal(true);
            };

            const confirmSwap = () => {
                setShowSwapModal(false);
                setSwapCount(prev => prev + 1); 
                const msg = document.createElement('div');
                msg.className = "fixed top-20 left-1/2 transform -translate-x-1/2 bg-stone-900 text-white px-6 py-3 rounded-full text-xs font-bold z-[100] shadow-xl animate-bounce";
                msg.innerText = "Takas İsteği Gönderildi!";
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 3000);
            };

            return (
                <div className="min-h-screen pb-24 overflow-x-hidden">
                    <header className="bg-white/80 backdrop-blur-md sticky top-0 z-40 px-6 py-4 flex justify-between items-center border-b border-stone-200">
                        <div>
                            <h1 className="text-xl font-bold tracking-tighter text-stone-800">TRAMPA</h1>
                            <p className="text-[10px] text-stone-500 uppercase tracking-widest">Circular Furniture System</p>
                        </div>
                        <div className="bg-stone-100 p-2 rounded-full">
                            <Icon name="RefreshCw" size={18} className="text-stone-600" />
                        </div>
                    </header>

                    <main className="p-6 max-w-2xl mx-auto">
                        {activeTab === 'marketplace' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                {!filterType ? (
                                    <div className="space-y-6 pt-4">
                                        <div className="text-center mb-8">
                                            <h2 className="text-2xl font-bold mb-2">Neyi değiştirmek istersiniz?</h2>
                                            <p className="text-stone-500 text-sm">Takas etmek istediğiniz kategoriyi seçerek başlayın.</p>
                                        </div>
                                        <div className="grid grid-cols-1 gap-4">
                                            <button onClick={() => setFilterType('top')} className="group bg-white border border-stone-200 rounded-[32px] p-8 flex items-center justify-between hover:border-stone-900 transition-all shadow-sm">
                                                <div className="text-left">
                                                    <h3 className="text-xl font-bold">Üst Tabla</h3>
                                                    <p className="text-stone-400 text-xs mt-1">Ahşap, mermer, kompozit...</p>
                                                </div>
                                                <div className="w-16 h-4 bg-stone-200 rounded-sm group-hover:bg-stone-800 transition-colors"></div>
                                            </button>
                                            <button onClick={() => setFilterType('leg')} className="group bg-white border border-stone-200 rounded-[32px] p-8 flex items-center justify-between hover:border-stone-900 transition-all shadow-sm">
                                                <div className="text-left">
                                                    <h3 className="text-xl font-bold">Masa Ayağı</h3>
                                                    <p className="text-stone-400 text-xs mt-1">Metal, ahşap, döküm...</p>
                                                </div>
                                                <div className="flex gap-4">
                                                    <div className="w-2 h-16 bg-stone-200 rounded-sm group-hover:bg-stone-800 transition-colors"></div>
                                                    <div className="w-2 h-16 bg-stone-200 rounded-sm group-hover:bg-stone-800 transition-colors"></div>
                                                </div>
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-6 animate-in slide-in-from-right duration-300">
                                        <div className="flex justify-between items-center">
                                            <button onClick={() => setFilterType(null)} className="flex items-center text-xs font-bold text-stone-400 hover:text-stone-900">
                                                <Icon name="ArrowLeft" size={16} className="mr-1" /> GERİ DÖN
                                            </button>
                                            <h2 className="text-sm font-bold uppercase tracking-widest text-stone-400">
                                                {filterType === 'top' ? 'Mevcut Tablalar' : 'Mevcut Ayaklar'}
                                            </h2>
                                        </div>
                                        <div className="grid grid-cols-1 gap-4">
                                            {marketplaceItems.filter(item => item.type === filterType).map((item) => (
                                                <div key={item.id} className="bg-white rounded-3xl border border-stone-200 overflow-hidden shadow-sm flex h-40">
                                                    <div className="w-40 h-full relative overflow-hidden flex-shrink-0">
                                                        <img src={item.image} alt={item.name} className="w-full h-full object-cover" />
                                                        <div className="absolute top-2 left-2 bg-black/70 text-white px-2 py-1 rounded-full text-[10px] font-bold flex items-center">
                                                            <Icon name="Star" size={10} className="mr-1 text-amber-400" />
                                                            {item.score}/10
                                                        </div>
                                                    </div>
                                                    <div className="p-4 flex flex-col justify-between flex-1">
                                                        <div>
                                                            <h3 className="font-bold text-base">{item.name}</h3>
                                                            <p className="text-xs text-stone-500">{item.material}</p>
                                                            <div className="flex items-center text-stone-400 mt-2">
                                                                <Icon name="MapPin" size={12} className="mr-1" />
                                                                <span className="text-[10px]">{item.distance}</span>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => handleSwapRequest(item)} className="w-full py-2 bg-stone-900 text-white text-[11px] font-bold rounded-xl uppercase tracking-wider">Takas Teklif Et</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'profile' && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="flex items-center space-x-4">
                                    <div className="w-16 h-16 rounded-full bg-stone-200 overflow-hidden border-2 border-white shadow-sm">
                                        <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&q=80&w=200" alt="Profil" />
                                    </div>
                                    <div>
                                        <h2 className="text-lg font-bold">Mimar Mert Y.</h2>
                                        <p className="text-xs text-stone-500">@mertyilmaz • Skor: 450</p>
                                    </div>
                                </div>

                                {/* Mevcut Mobilya Kurulumu */}
                                <div className="bg-white border border-stone-200 rounded-[32px] p-6 shadow-sm">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-sm uppercase tracking-wider text-stone-400">Mevcut Kurulum</h3>
                                        <div className="px-2 py-1 bg-green-50 text-green-600 rounded-full text-[9px] font-black uppercase tracking-tighter">Aktif</div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="p-3 bg-stone-50 rounded-2xl border border-stone-100 flex items-center">
                                            <div className="w-10 h-10 rounded-lg bg-stone-200 mr-3 overflow-hidden shadow-inner">
                                                <img src={selectedTop.image} className="w-full h-full object-cover" />
                                            </div>
                                            <div className="overflow-hidden">
                                                <p className="text-[9px] font-bold text-stone-400 uppercase">Üst Tabla</p>
                                                <p className="text-xs font-bold truncate">{selectedTop.name}</p>
                                            </div>
                                        </div>
                                        <div className="p-3 bg-stone-50 rounded-2xl border border-stone-100 flex items-center">
                                            <div className="w-10 h-10 rounded-lg bg-stone-200 mr-3 overflow-hidden shadow-inner">
                                                <img src={selectedLeg.image} className="w-full h-full object-cover" />
                                            </div>
                                            <div className="overflow-hidden">
                                                <p className="text-[9px] font-bold text-stone-400 uppercase">Masa Ayağı</p>
                                                <p className="text-xs font-bold truncate">{selectedLeg.name}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-stone-900 p-6 rounded-[32px] text-white shadow-xl shadow-stone-200">
                                        <h4 className="text-stone-500 text-[10px] font-bold uppercase tracking-widest mb-1">Toplam Takas</h4>
                                        <p className="text-3xl font-black">{swapCount}</p>
                                        <div className="mt-4 flex items-center text-[10px] text-stone-400 font-bold">
                                            <Icon name="CheckCircle2" size={12} className="mr-1 text-green-500" />
                                            DOĞRULANMIŞ
                                        </div>
                                    </div>
                                    <div className="bg-amber-50 p-6 rounded-[32px] border border-amber-100">
                                        <h4 className="text-amber-800 text-[10px] font-bold uppercase tracking-widest mb-1">Trampa Skoru</h4>
                                        <p className="text-3xl font-black text-amber-900">450</p>
                                        <div className="mt-4 flex items-center text-[10px] text-amber-600 font-bold">
                                            <Icon name="Sparkles" size={12} className="mr-1" />
                                            TOP %5
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white border border-stone-200 rounded-[32px] overflow-hidden shadow-sm">
                                    <div className="px-6 py-4 border-b border-stone-100 flex justify-between items-center">
                                        <h3 className="font-bold text-xs uppercase tracking-wider">Geçmiş Hareketler</h3>
                                        <Icon name="ChevronRight" size={16} className="text-stone-300" />
                                    </div>
                                    <div className="p-4 space-y-4">
                                        <div className="flex items-center justify-between text-xs">
                                            <div className="flex items-center">
                                                <div className="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center mr-3">
                                                    <Icon name="Repeat" size={14} className="text-stone-400" />
                                                </div>
                                                <span className="font-medium text-stone-600">Siyah Mermer Takası</span>
                                            </div>
                                            <span className="text-stone-400 font-medium">12 Mar</span>
                                        </div>
                                        <div className="flex items-center justify-between text-xs">
                                            <div className="flex items-center">
                                                <div className="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center mr-3">
                                                    <Icon name="Plus" size={14} className="text-stone-400" />
                                                </div>
                                                <span className="font-medium text-stone-600">Yeni Envanter: Çelik Ayak</span>
                                            </div>
                                            <span className="text-stone-400 font-medium">05 Mar</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-200 px-6 py-3 flex justify-around items-center z-50">
                        <button onClick={() => setActiveTab('marketplace')} className={`flex flex-col items-center ${activeTab === 'marketplace' ? 'text-stone-900' : 'text-zinc-400'}`}>
                            <Icon name="Repeat" />
                            <span className="text-[10px] mt-1 font-medium uppercase">Takas</span>
                        </button>
                        <button onClick={() => setActiveTab('profile')} className={`flex flex-col items-center ${activeTab === 'profile' ? 'text-stone-900' : 'text-zinc-400'}`}>
                            <Icon name="User" />
                            <span className="text-[10px] mt-1 font-medium uppercase">Profil</span>
                        </button>
                    </nav>

                    {/* Swap Modal */}
                    {showSwapModal && (
                        <div className="fixed inset-0 z-[60] flex items-end justify-center p-4">
                            <div className="absolute inset-0 bg-stone-900/40 backdrop-blur-sm" onClick={() => setShowSwapModal(false)}></div>
                            <div className="relative bg-white w-full max-w-md rounded-t-[40px] p-8 shadow-2xl animate-in slide-in-from-bottom-10 duration-300">
                                <h3 className="text-xl font-bold text-center mb-6">Takas Teklifi</h3>
                                <div className="flex items-center justify-between mb-8 px-4">
                                    <div className="text-center w-24">
                                        <div className="h-20 w-20 bg-stone-100 rounded-2xl mx-auto mb-2 overflow-hidden border">
                                            <img src={swapTarget?.image} className="w-full h-full object-cover" />
                                        </div>
                                        <span className="text-[10px] font-bold uppercase truncate block">{swapTarget?.name}</span>
                                    </div>
                                    <Icon name="Repeat" className="text-stone-400 animate-spin-slow" />
                                    <div className="text-center w-24 border-2 border-dashed border-stone-200 rounded-2xl h-24 flex flex-col items-center justify-center">
                                        <Icon name="Plus" className="text-stone-300" />
                                        <span className="text-[9px] text-stone-300 font-bold mt-1">SEÇ</span>
                                    </div>
                                </div>
                                <button onClick={confirmSwap} className="w-full py-4 bg-stone-900 text-white rounded-2xl font-bold uppercase tracking-wider shadow-lg shadow-stone-200">Teklifi Gönder</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
